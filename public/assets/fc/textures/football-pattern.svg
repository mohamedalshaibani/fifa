<svg width="800" height="200" viewBox="0 0 800 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Football pattern texture for cards -->
  <defs>
    <pattern id="footballTexture" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="18" fill="none" stroke="#16a34a" stroke-width="0.5" opacity="0.1"/>
      <path d="M8,20 L32,20 M20,8 L20,32" stroke="#059669" stroke-width="0.3" opacity="0.05"/>
    </pattern>
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#f1f5f9;stop-opacity:0.9"/>
    </linearGradient>
  </defs>
  
  <rect width="800" height="200" fill="url(#cardGradient)"/>
  <rect width="800" height="200" fill="url(#footballTexture)"/>
  
  <!-- Subtle corner accents -->
  <polygon points="0,0 30,0 0,30" fill="#16a34a" opacity="0.08"/>
  <polygon points="770,0 800,0 800,30" fill="#16a34a" opacity="0.08"/>
</svg>