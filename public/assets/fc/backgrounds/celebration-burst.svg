<svg width="1200" height="300" viewBox="0 0 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Celebration burst pattern -->
  <defs>
    <radialGradient id="burstCenter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:0.6"/>
      <stop offset="70%" style="stop-color:#f59e0b;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="rayGradient" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#f59e0b;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:0"/>
    </linearGradient>
  </defs>
  
  <!-- Central burst -->
  <ellipse cx="600" cy="150" rx="200" ry="100" fill="url(#burstCenter)"/>
  
  <!-- Radiating light rays -->
  <polygon points="400,150 500,140 800,140 900,150 800,160 500,160" fill="url(#rayGradient)" opacity="0.6"/>
  <polygon points="600,50 610,100 590,100" fill="#fbbf24" opacity="0.5"/>
  <polygon points="600,250 610,200 590,200" fill="#fbbf24" opacity="0.5"/>
  
  <!-- Sparkle effects -->
  <g fill="#ffffff" opacity="0.8">
    <polygon points="300,80 305,90 300,100 295,90" transform="rotate(45 300 90)"/>
    <polygon points="900,70 905,80 900,90 895,80" transform="rotate(-30 900 80)"/>
    <polygon points="250,200 255,210 250,220 245,210" transform="rotate(15 250 210)"/>
    <polygon points="950,190 955,200 950,210 945,200" transform="rotate(-45 950 200)"/>
  </g>
  
  <!-- Confetti particles -->
  <g opacity="0.6">
    <rect x="350" y="100" width="3" height="8" fill="#16a34a" transform="rotate(20 350 100)"/>
    <rect x="850" y="120" width="3" height="8" fill="#059669" transform="rotate(-15 850 120)"/>
    <rect x="400" y="200" width="3" height="8" fill="#16a34a" transform="rotate(45 400 200)"/>
    <rect x="800" y="180" width="3" height="8" fill="#059669" transform="rotate(-30 800 180)"/>
  </g>
</svg>