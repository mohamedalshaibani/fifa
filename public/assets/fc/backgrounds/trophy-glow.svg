<svg width="300" height="300" viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Trophy with celebration glow -->
  <defs>
    <radialGradient id="trophyGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:0.8"/>
      <stop offset="30%" style="stop-color:#f59e0b;stop-opacity:0.6"/>
      <stop offset="70%" style="stop-color:#d97706;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#92400e;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="innerGlow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:0"/>
    </radialGradient>
  </defs>
  
  <!-- Main glow effect -->
  <circle cx="150" cy="150" r="140" fill="url(#trophyGlow)"/>
  
  <!-- Trophy base -->
  <rect x="130" y="200" width="40" height="60" fill="#d97706" opacity="0.7"/>
  
  <!-- Trophy cup -->
  <path d="M100,200 Q100,150 150,150 Q200,150 200,200 L180,200 Q150,180 120,200 Z" fill="#f59e0b" opacity="0.8"/>
  
  <!-- Trophy handles -->
  <circle cx="85" cy="175" r="8" fill="none" stroke="#d97706" stroke-width="3" opacity="0.6"/>
  <circle cx="215" cy="175" r="8" fill="none" stroke="#d97706" stroke-width="3" opacity="0.6"/>
  
  <!-- Inner glow -->
  <ellipse cx="150" cy="150" rx="80" ry="60" fill="url(#innerGlow)"/>
  
  <!-- Celebration particles -->
  <circle cx="80" cy="80" r="3" fill="#fbbf24" opacity="0.7"/>
  <circle cx="220" cy="70" r="2" fill="#f59e0b" opacity="0.8"/>
  <circle cx="250" cy="120" r="4" fill="#fbbf24" opacity="0.6"/>
  <circle cx="60" cy="140" r="2" fill="#f59e0b" opacity="0.7"/>
  <circle cx="90" cy="250" r="3" fill="#fbbf24" opacity="0.5"/>
  <circle cx="210" cy="240" r="2" fill="#f59e0b" opacity="0.8"/>
</svg>